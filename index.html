<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HYBRO · TCO Calculator · Armenia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #F7F8FA; color: #1A202C; min-height: 100vh; }

  .hybro__header { background: #0D2B4E; padding: 36px 0 40px; position: relative; overflow: hidden; }
  .hybro__header-deco { position: absolute; top: -80px; right: -80px; width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,.03) 0%, transparent 70%); pointer-events: none; }
  .hybro__header-inner { max-width: 880px; margin: 0 auto; padding: 0 16px; position: relative; z-index: 1; }
  .hybro__badge { display: inline-block; margin-bottom: 14px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.65); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; border-radius: 20px; padding: 4px 12px; }
  .hybro__h1 { font-family: 'Outfit', sans-serif; font-size: clamp(24px,5vw,42px); font-weight: 800; color: #fff; letter-spacing: -.5px; line-height: 1.15; margin-bottom: 12px; }
  .hybro__h1 span { color: #7EB8F7; }
  .hybro__sub { font-size: 14px; color: rgba(255,255,255,.5); max-width: 520px; line-height: 1.6; }

  /* LANG SWITCHER */
  .lang-bar { display: flex; justify-content: flex-end; margin-bottom: 14px; gap: 4px; }
  .lang-btn { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.55); font-size: 11px; font-weight: 700; border-radius: 6px; padding: 4px 10px; cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif; }
  .lang-btn:hover { background: rgba(255,255,255,.18); color: #fff; }
  .lang-btn.active { background: #fff; color: #0D2B4E; border-color: #fff; }

  .hybro__body { max-width: 880px; margin: 0 auto; padding: 24px 16px 60px; }
  .card { background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .section-title { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .section-title span { font-size: 10px; font-weight: 700; letter-spacing: .13em; text-transform: uppercase; color: #0D2B4E; white-space: nowrap; }
  .section-title hr { flex: 1; height: 1px; border: none; background: #E8EFF7; }

  .toggle-row { background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; transition: all .18s; margin-bottom: 12px; }
  .toggle-left { display: flex; align-items: center; gap: 14px; }
  .toggle-pill { width: 46px; height: 26px; border-radius: 13px; flex-shrink: 0; position: relative; background: #E2E8F0; transition: background .2s; }
  .toggle-dot { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2); transition: left .2s; }
  .toggle-title { font-size: 14px; font-weight: 700; color: #1A202C; }
  .toggle-sub { font-size: 11px; color: #64748B; margin-top: 2px; }
  .toggle-badge { font-size: 11px; font-weight: 700; padding: 3px 12px; border-radius: 20px; flex-shrink: 0; margin-left: 12px; display: none; color: #fff; }

  .hybro-slider { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 4px; outline: none; cursor: pointer; margin: 10px 0; }
  .hybro-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #fff; border: 2px solid #0D2B4E; box-shadow: 0 1px 4px rgba(13,43,78,.25); cursor: pointer; }

  .select-wrap { position: relative; }
  .select-wrap select { width: 100%; padding: 11px 36px 11px 14px; border: 1px solid #E2E8F0; border-radius: 8px; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #1A202C; appearance: none; cursor: pointer; outline: none; }
  .select-wrap::after { content: "▾"; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #64748B; pointer-events: none; font-size: 13px; }

  /* CLEAN TARIFF BADGE */
  .tariff-badge { display: flex; align-items: center; gap: 0; background: #F7F8FA; border: 1px solid #E2E8F0; border-radius: 10px; padding: 10px 14px; margin-top: 12px; overflow: hidden; }
  .tariff-badge-item { flex: 1; padding: 0 12px; }
  .tariff-badge-item:first-child { padding-left: 0; }
  .tariff-badge-label { font-size: 10px; font-weight: 700; letter-spacing: .10em; text-transform: uppercase; color: #64748B; margin-bottom: 3px; }
  .tariff-badge-val { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: #0D2B4E; }
  .tariff-badge-sep { width: 1px; height: 32px; background: #E2E8F0; flex-shrink: 0; }

  .opex-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #F7F8FA; border-radius: 10px; margin-bottom: 8px; }
  .opex-row:last-child { margin-bottom: 0; }
  .opex-name { font-size: 14px; font-weight: 700; color: #1A202C; }
  .opex-sub { font-size: 11px; color: #94A3B8; font-family: 'DM Mono', monospace; margin-top: 2px; }
  .opex-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 700; }
  .opex-unit { font-size: 12px; color: #64748B; margin-left: 4px; }

  .info-tile { border-radius: 10px; padding: 18px 20px; }
  .info-tile--dark { background: #0D2B4E; }
  .info-tile--amber { background: #fffbeb; border: 1px solid #fde68a; }
  .tile-num { font-family: 'Outfit', sans-serif; font-size: 42px; font-weight: 800; line-height: 1; }
  .tile-num--white { color: #fff; }
  .tile-num--amber { color: #d97706; font-size: 28px; }
  .tile-label { font-size: 14px; font-weight: 700; margin-top: 6px; }
  .tile-label--white { color: #fff; }
  .tile-label--amber { color: #92400e; }
  .tile-sub { font-size: 12px; margin-top: 4px; }
  .tile-sub--muted { color: rgba(255,255,255,.55); }
  .tile-sub--amber { color: #92400e; }

  .capex-card { border: 1px solid #E2E8F0; border-radius: 10px; padding: 18px 20px; }
  .capex-label { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #64748B; margin-bottom: 6px; }
  .capex-name { font-size: 15px; font-weight: 700; color: #1A202C; margin-bottom: 10px; }
  .capex-val { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -1px; }
  .capex-sub { font-size: 11px; color: #94A3B8; margin-top: 4px; }

  .widget-label { font-size: 12px; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .widget-num { font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 800; color: #0D2B4E; line-height: 1; }
  .widget-sub { font-family: 'DM Mono', monospace; font-size: 12px; color: #94A3B8; margin-top: 6px; }
  .widget-big { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 800; color: #0D2B4E; line-height: 1.15; margin-bottom: 10px; }
  .widget-muted { font-size: 13px; color: #94A3B8; line-height: 1.7; }
  .payback-label { font-size: 12px; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
  .payback-val { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 800; }

  .conclusion { background: #0D2B4E; border-radius: 12px; padding: 28px; }
  .conclusion__title { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.4); margin-bottom: 16px; }
  .conclusion__block { border-radius: 8px; padding: 14px 18px; margin-bottom: 10px; }
  .conclusion__block:last-child { margin-bottom: 0; }
  .conclusion__block--blue  { background: rgba(126,184,247,.10); border-left: 3px solid #7EB8F7; }
  .conclusion__block--amber { background: rgba(196,98,45,.12); border-left: 3px solid #C4622D; }
  .conclusion__block--green { background: rgba(22,163,74,.10); border-left: 3px solid #16a34a; }
  .conclusion__text { font-size: 15px; line-height: 1.8; color: rgba(255,255,255,.82); font-weight: 500; }
  .conclusion__text strong { color: #fff; font-weight: 800; }
  .c-accent { color: #7EB8F7; font-weight: 700; }
  .c-num { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 800; color: #fff; }
  .c-warn { color: #fca5a5; font-weight: 700; }
  .c-green { color: #86efac; font-weight: 700; }
  .conclusion__pill { display: inline-block; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); color: rgba(255,255,255,.6); font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-top: 8px; }

  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
  .chart-wrap { position: relative; height: 300px; }
  .chart-legend { display: flex; gap: 20px; justify-content: center; margin-top: 12px; font-size: 13px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-line { display: inline-block; width: 28px; height: 3px; border-radius: 2px; }

  @media (max-width: 580px) {
    .g2, .g3 { grid-template-columns: 1fr; }
    .hybro__body { padding: 16px 12px 40px; }
  }
</style>
</head>
<body>

<div class="hybro__header">
  <div class="hybro__header-deco"></div>
  <div class="hybro__header-inner">
    <div class="lang-bar">
      <button class="lang-btn" onclick="setLang('RU')">RU</button>
      <button class="lang-btn" onclick="setLang('EN')">EN</button>
      <button class="lang-btn active" onclick="setLang('AM')">ՀԱՅ</button>
    </div>
    <div class="hybro__badge" id="i-badge"></div>
    <h1 class="hybro__h1"><span id="i-title1"></span><br><span id="i-title2" style="color:#7EB8F7"></span></h1>
    <p class="hybro__sub" id="i-subtitle"></p>
  </div>
</div>

<div class="hybro__body">

  <div class="toggle-row" id="tog-solar" onclick="toggleSolar()">
    <div class="toggle-left">
      <div class="toggle-pill" id="pill-solar"><div class="toggle-dot" id="dot-solar"></div></div>
      <div>
        <div class="toggle-title" id="i-solarTitle"></div>
        <div class="toggle-sub" id="i-solarSub"></div>
      </div>
    </div>
    <div class="toggle-badge" id="badge-solar" style="background:#16a34a;" id="i-activated"></div>
  </div>

  <div class="card">
    <div class="section-title"><span id="i-paramsTitle"></span><hr /></div>
    <div class="g2" style="align-items:start">
      <div>
        <div style="font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#64748B;margin-bottom:8px" id="i-areaLabel"></div>
        <div style="font-family:'Outfit',sans-serif;font-size:40px;font-weight:800;color:#0D2B4E;line-height:1">
          <span id="area-display">100</span><span style="font-size:18px;font-weight:700;color:#64748B;margin-left:4px">м²</span>
        </div>
        <input type="range" class="hybro-slider" id="area-slider" min="50" max="250" value="100" oninput="onAreaChange(this.value)" />
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#94A3B8"><span>50 м²</span><span>250 м²</span></div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#64748B;margin-bottom:8px" id="i-epcLabel"></div>
        <div class="select-wrap">
          <select id="epc-select" onchange="S.epcValue=+this.value; render();">
            <option value="35" id="epc-opt-0"></option>
            <option value="50" id="epc-opt-1"></option>
            <option value="75" selected id="epc-opt-2"></option>
            <option value="100" id="epc-opt-3"></option>
            <option value="130" id="epc-opt-4"></option>
          </select>
        </div>
        <!-- CLEAN TARIFF BADGE — top tier only, no table -->
        <div class="tariff-badge">
          <div class="tariff-badge-item">
            <div class="tariff-badge-label" id="i-tariffElec"></div>
            <div class="tariff-badge-val">53.48 ֏ / 43.48 ֏</div>
          </div>
          <div class="tariff-badge-sep"></div>
          <div class="tariff-badge-item">
            <div class="tariff-badge-label" id="i-tariffGas"></div>
            <div class="tariff-badge-val">144 ֏/м³</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title"><span id="i-chartTitle"></span><hr /></div>
    <div class="chart-wrap"><canvas id="tco-chart"></canvas></div>
    <div class="chart-legend">
      <span class="legend-item"><span class="legend-line" style="background:#C4622D"></span><span id="i-gasBoilerLeg"></span></span>
      <span class="legend-item"><span class="legend-line" style="background:#1A6FAD"></span><span id="i-heatPumpLeg"></span></span>
      <span class="legend-item"><span class="legend-line" style="background:#0D2B4E;height:4px"></span>HYBRO</span>
    </div>
  </div>

  <div class="g2" style="margin-bottom:16px">
    <div class="info-tile info-tile--dark">
      <div class="tile-num tile-num--white" id="tile-panels">—</div>
      <div class="tile-label tile-label--white" id="i-panelsLabel"></div>
      <div class="tile-sub tile-sub--muted" id="tile-panels-sub">—</div>
    </div>
    <div class="info-tile info-tile--amber">
      <div class="tile-num tile-num--amber" id="tile-daily">—</div>
      <div class="tile-label tile-label--amber" id="i-consumLabel"></div>
      <div class="tile-sub tile-sub--amber" id="tile-yearly" style="margin-top:6px">—</div>
      <div class="tile-sub tile-sub--amber" id="tile-hours" style="margin-top:4px">—</div>
    </div>
  </div>

  <div class="card">
    <div class="section-title"><span id="i-capexTitle"></span><hr /></div>
    <div class="g3">
      <div class="capex-card" style="border-top:3px solid #C4622D">
        <div class="capex-label" id="i-gasBoilerC"></div>
        <div class="capex-name" id="i-gasC"></div>
        <div class="capex-val" style="color:#C4622D" id="cv-gas">—</div>
        <div class="capex-sub" id="i-gasSub"></div>
      </div>
      <div class="capex-card" style="border-top:3px solid #1A6FAD">
        <div class="capex-label" id="i-heatPumpC"></div>
        <div class="capex-name" id="i-heatPumpN"></div>
        <div class="capex-val" style="color:#1A6FAD" id="cv-hp">—</div>
        <div class="capex-sub" id="i-hpSub"></div>
      </div>
      <div class="capex-card" style="border-top:3px solid #0D2B4E">
        <div class="capex-label" id="i-infrared"></div>
        <div class="capex-name">HYBRO</div>
        <div class="capex-val" style="color:#0D2B4E" id="cv-hybro">—</div>
        <div class="capex-sub" id="cv-hybro-sub">—</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title"><span id="i-opexTitle"></span><hr /></div>
    <div class="opex-row" style="border-left:3px solid #C4622D">
      <div><div class="opex-name" id="i-gasBoilerO"></div><div class="opex-sub" id="opex-gas-sub">—</div></div>
      <div style="text-align:right;flex-shrink:0;margin-left:16px">
        <span class="opex-val" style="color:#C4622D" id="opex-gas-val">—</span><span class="opex-unit" id="i-perYear1"></span>
      </div>
    </div>
    <div class="opex-row" style="border-left:3px solid #1A6FAD">
      <div><div class="opex-name" id="i-heatPumpO"></div><div class="opex-sub" id="opex-hp-sub">—</div></div>
      <div style="text-align:right;flex-shrink:0;margin-left:16px">
        <span class="opex-val" style="color:#1A6FAD" id="opex-hp-val">—</span><span class="opex-unit" id="i-perYear2"></span>
      </div>
    </div>
    <div class="opex-row" style="border-left:3px solid #0D2B4E">
      <div><div class="opex-name">HYBRO IR</div><div class="opex-sub" id="opex-hybro-sub">—</div></div>
      <div style="text-align:right;flex-shrink:0;margin-left:16px">
        <span class="opex-val" style="color:#0D2B4E" id="opex-hybro-val">—</span><span class="opex-unit" id="i-perYear3"></span>
      </div>
    </div>
  </div>

  <div class="g2" style="margin-bottom:16px">
    <div class="card" style="margin-bottom:0">
      <div class="section-title"><span id="i-tariffZoneTitle"></span><hr /></div>
      <div class="widget-label" id="i-winterConsum"></div>
      <div class="widget-num" id="w-limit-num">—</div>
      <div class="widget-sub" id="w-limit-zone">—</div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="section-title"><span id="i-paybackTitle"></span><hr /></div>
      <div id="w-payback-content">—</div>
    </div>
  </div>

  <div class="conclusion">
    <div class="conclusion__title" id="i-conclusionTitle"></div>
    <div class="conclusion__block conclusion__block--blue">
      <p class="conclusion__text" id="concl-hp">—</p>
    </div>
    <div class="conclusion__block" id="concl-gas-block">
      <p class="conclusion__text" id="concl-gas">—</p>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════════
   i18n DICTIONARY
══════════════════════════════════════ */
const T = {
  RU: {
    badge:'Версия для Армении · AMD ֏', t1:'Реальная стоимость отопления', t2:'на 20 лет',
    sub:'Сравните полную стоимость HYBRO, газового котла и теплового насоса — с учётом монтажа, тарифов и инфляции.',
    solarTitle:'Инвестиция в СЭС (Net Billing / Активный потребитель)',
    solarSub:'Установка солнечной станции · 10 кВт на 100 м²',
    activated:'Активировано', paramsTitle:'Параметры объекта', areaLabel:'Площадь помещения',
    epcLabel:'Класс энергоэффективности (EPC)',
    tariffElec:'Электричество (>400 кВт·ч)', tariffGas:'Газ',
    chartTitle:'Совокупная стоимость за 20 лет (TCO)',
    gasBoiler:'Газовый котёл', heatPump:'Тепловой насос', gas:'Газ',
    panelsLabel:'Панелей HYBRO (375 Вт)', consumLabel:'Потребление HYBRO (сезон ÷ 180 дней)',
    capexTitle:'Начальные инвестиции (CAPEX)',
    gasSub:'котёл + подключение + трубы', hpSub:'монтаж + тёплый пол',
    infrared:'Инфракрасные панели', opexTitle:'Годовая стоимость отопления (OPEX, Год 1)',
    kWh:'кВт·ч', perYear:'/год', perMonth:'/мес', million:'млн', yr:'л.',
    tariffZoneTitle:'Тарифная зона HYBRO',
    winterConsum:'Зимнее потребление / месяц', paybackTitle:'Окупаемость конкурентов',
    conclusionTitle:'Вывод анализа',
    epcOpts:['Класс А+ · 35 кВт·ч/м²','Класс А · 50 кВт·ч/м²','Класс B · 75 кВт·ч/м²','Класс C · 100 кВт·ч/м²','Класс D · 130 кВт·ч/м²'],
    zone1:'Зона 1 (до 200 кВт·ч) · 36.48–46.48 ֏', zone2:'Зона 2 (201–400 кВт·ч) · 38.48–48.48 ֏', zone3:'Зона 3 (400+ кВт·ч) · 43.48–53.48 ֏',
    never:'Никогда', yr:'л.',
    payNeverSolar:'СЭС не покрывает расходы на обслуживание теплового насоса.',
    payNever:'Переплата за монтаж водяных систем не вернётся за 20 лет.',
    tileHours: h=>`Среднее время работы: ~${h} ч/сут`,
    tilePeak:  (kw,epc,a,cnt)=>`${kw} кВт пика · EPC ${epc} · ${a} м² · ${cnt} панелей`,
    tileYear:  kwh=>`${kwh} кВт·ч/год · ТО: 0 ֏`,
    hybroSub:  (c,s)=>`${c} пан. + монтаж${s?' + СЭС':''}`,
    solSubDyn: amt=>`Установка солнечной станции · 10 кВт на 100 м² · ${amt}`,
    gasOSub:   m3=>`${m3} м³ × 144 ֏ + ГВС + ТО`,
    hpOSub:    kwh=>`COP 3.5 → ${kwh} кВт·ч + ТО`,
    hybOSub:   kwh=>`${kwh} кВт·ч/год + ГВС · ТО: 0 ֏`,
    hpPill:'ТО HYBRO: 0 ֏',
    hpSave: amt=>`Вы экономите <span class="c-num">${amt}</span> на старте —`,

/* ══════════════════════════════════════
   MATH CONSTANTS
══════════════════════════════════════ */
const PANEL_PRICE_AMD = 100000;
const THERMOSTAT_PRICE_AMD = 20000;
const THERMOSTAT_COVERAGE_M2 = 20;
const GAS_PRICE_AMD=144, GAS_WATER_AMD=40000, GAS_MAINT_AMD=20000;
const T1L=200, T2L=400;
const T1D=46.48,T1N=36.48, T2D=48.48,T2N=38.48, T3D=53.48,T3N=43.48;
const EI=0.07, GI=0.05;

function fmtAMD(n){
  n=Math.round(n);
  const mlnSuffix = {RU:' млн ֏', EN:' M ֏', AM:' մլն ֏'}[S.lang]||' млн ֏';
  const loc = {RU:'ru-RU', EN:'en-US', AM:'hy-AM'}[S.lang]||'ru-RU';
  return n>=1e6 ? (n/1e6).toFixed(2)+mlnSuffix : n.toLocaleString(loc)+' ֏';
}
function fmtK(n){ return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'k':Math.round(n).toString(); }

/* ══════════════════════════════════════
   PROGRESSIVE TARIFF — MATH UNCHANGED
══════════════════════════════════════ */
function calcArmeniaMonthCost(kWh, nR, dR) {
  let c=0;
  const b1=Math.min(kWh,T1L); c+=b1*(nR*T1N+dR*T1D);
  if(kWh>T1L){ const b2=Math.min(kWh-T1L,T2L-T1L); c+=b2*(nR*T2N+dR*T2D); }
  if(kWh>T2L){ c+=(kWh-T2L)*(nR*T3N+dR*T3D); }
  return c;
}
function zoneLabel(kWh){ const t=T[S.lang]; return kWh<=T1L?t.zone1:kWh<=T2L?t.zone2:t.zone3; }

function calcHybroCapEx(area, epc) {
  const daily=( area*epc*0.7225)/180;
  const cnt=Math.ceil(daily/2.475);
  const thermostats = Math.ceil(area / THERMOSTAT_COVERAGE_M2);
  const capex = cnt*PANEL_PRICE_AMD + thermostats*THERMOSTAT_PRICE_AMD + 150000;
  return { capex, cnt, daily, peakKw:+(cnt*0.375).toFixed(2), activeHours:+(daily/(cnt*0.375)).toFixed(1) };
}
function calcOpEx(area,epc){
  const hH=area*epc*0.7225, hHP=(area*epc)/3.5, hGm=(area*epc)/9.5;
  const hyM=hH/6+200, hpM=hHP/6+200;
  const hyC=calcArmeniaMonthCost(hyM,0.60,0.40)*6+1200*T1N;
  const hpC=calcArmeniaMonthCost(hpM,0.50,0.50)*6+1200*T1N;
  const gC=hGm*GAS_PRICE_AMD+GAS_WATER_AMD+GAS_MAINT_AMD;
  return {hyC,hpC,gC,hyM,hpM,hH,hHP,hGm};
}
function buildTCO(area,epc,solar){
  const hy=calcHybroCapEx(area,epc);
  const sc=solar?(area/100)*2400000:0;
  const cH=hy.capex+sc, cG=1400000+area*12000, cHP=2500000+area*12000+sc;
  const ops=calcOpEx(area,epc);
  const hyC=solar?0:ops.hyC, hpC=solar?0:ops.hpC, gC=ops.gC;
  let cumH=cH,cumG=cG,cumHP=cHP;
  const d=[{y:0,h:Math.round(cumH),g:Math.round(cumG),hp:Math.round(cumHP)}];
  for(let y=1;y<=20;y++){
    const eF=Math.pow(1+EI,y), gF=Math.pow(1+GI,y);
    const mG=GAS_MAINT_AMD+(y%5===0?50000:0)+(y===12?500000:0);
    const mHP=70000+(y===15?800000:0);
    cumH+=hyC*eF; cumG+=gC*gF+mG; cumHP+=hpC*eF+mHP;
    d.push({y,h:Math.round(cumH),g:Math.round(cumG),hp:Math.round(cumHP)});
  }
  return d;
}
function findBE(tco,kA,kB){
  for(let i=1;i<tco.length;i++){
    const p=tco[i-1],c=tco[i];
    if(p[kA]>=p[kB]&&c[kA]<c[kB]){
      const f=(p[kA]-p[kB])/((p[kA]-p[kB])-(c[kA]-c[kB]));
      return ((i-1)+f).toFixed(1);
    }
  }
  return null;
}

function render(){
  const {area,epcValue:epc,solarToggle:solar,lang}=S;
  const t=T[lang];
  const EL={35:'А+',50:'А',75:'B',100:'C',130:'D'};
  const hy=calcHybroCapEx(area,epc);
  const ops=calcOpEx(area,epc);
  const tco=buildTCO(area,epc,solar);
  const sc=(area/100)*2400000;
  const cH=hy.capex+(solar?sc:0), cG=1400000+area*12000, cHP=2500000+area*12000+(solar?sc:0);
  const beGas=findBE(tco,'g','h'), beHP=findBE(tco,'hp','h');
  const hyOpEx=solar?0:ops.hyC, hpOpEx=solar?0:ops.hpC;

  // Solar sub
  document.getElementById('i-solarSub').textContent=t.solSubDyn(fmtAMD(sc));
  // Tiles
  document.getElementById('tile-panels').textContent=hy.cnt;
  document.getElementById('tile-panels-sub').textContent=t.tilePeak(hy.peakKw,EL[epc],area);
  document.getElementById('tile-daily').textContent='~'+Math.round(hy.daily)+' '+t.kWh;
  document.getElementById('tile-yearly').textContent=t.tileYear(Math.round(ops.hH).toLocaleString('ru-RU'));
  document.getElementById('tile-hours').textContent=t.tileHours(hy.activeHours);
  // CapEx
  document.getElementById('cv-gas').textContent=fmtAMD(cG);
  document.getElementById('cv-hp').textContent=fmtAMD(cHP);
  document.getElementById('cv-hybro').textContent=fmtAMD(cH);
  document.getElementById('cv-hybro-sub').textContent=t.hybroSub(hy.cnt,solar);
  // OpEx
  document.getElementById('opex-gas-sub').textContent=t.gasOSub(Math.round(ops.hGm).toLocaleString('ru-RU'));
  document.getElementById('opex-gas-val').textContent=fmtAMD(ops.gC);
  document.getElementById('opex-hp-sub').textContent=t.hpOSub(Math.round(ops.hHP).toLocaleString('ru-RU'));
  document.getElementById('opex-hp-val').textContent=fmtAMD(hpOpEx);
  document.getElementById('opex-hybro-sub').textContent=t.hybOSub(Math.round(ops.hH).toLocaleString('ru-RU'));
  document.getElementById('opex-hybro-val').textContent=fmtAMD(hyOpEx);
  // Widget 1
  document.getElementById('w-limit-num').textContent=Math.round(ops.hyM).toLocaleString('ru-RU');
  document.getElementById('w-limit-zone').textContent=zoneLabel(ops.hyM);
  // Widget 2
  const gN=!beGas||+beGas>30, hN=!beHP||+beHP>30;
  let pw='';
  if(solar&&hN) pw=`<div class="widget-big">${t.never}.</div><p class="widget-muted">${t.payNeverSolar}</p>`;
  else if(gN&&hN) pw=`<div class="widget-big">${t.never}.</div><p class="widget-muted">${t.payNever}</p>`;
  else pw=[{label:t.gas,val:beGas,color:'#C4622D',nev:gN},{label:t.heatPump,val:beHP,color:'#1A6FAD',nev:hN}]
    .map(r=>`<div style="margin-bottom:14px"><div class="payback-label">${r.label}</div><div class="payback-val" style="color:${r.nev?'#94A3B8':r.color}">${r.nev?t.never:r.val+' '+t.yr}</div></div>`).join('');
  document.getElementById('w-payback-content').innerHTML=pw;

  // ── CONCLUSION: Heat Pump ──
  const hpD = cHP - cH;
  let hpHTML = '';
  if (hyOpEx === 0) {
    // Solar ON → division by zero guard → special text
    hpHTML = `<span class="c-accent">${t.hpVs}</span> `
      + t.hpSolarWin(fmtAMD(hpD))
      + `<br><span class="conclusion__pill">${t.hpPill}</span>`;
  } else {
    const hpY = (hpD / hyOpEx).toFixed(1);
    hpHTML = `<span class="c-accent">${t.hpVs}</span> `
      + t.hpSave(fmtAMD(hpD)) + ' ' + t.hpYears(hpY)
      + `<br><span class="conclusion__pill">${t.hpPill}</span>`;
  }
  document.getElementById('concl-hp').innerHTML = hpHTML;

  // ── CONCLUSION: Gas ──
  // Use real OpEx values (0 when solar ON) for correct comparison
  const gb = document.getElementById('concl-gas-block');
  let gasText = '';

  if (cH < cG && hyOpEx < ops.gC) {
    // HYBRO cheaper on BOTH CapEx and OpEx → absolute win
    gb.className = 'conclusion__block conclusion__block--green';
    gasText = `<span class="c-accent">${t.gasVs}</span> ${t.gasAbsoluteWin}`;

  } else if (cH > cG && hyOpEx < ops.gC) {
    // HYBRO more expensive upfront but cheaper to run (Solar ON scenario)
    // Payback = CapEx delta / annual OpEx delta
    const deltaCapEx  = cH - cG;
    const deltaOpEx   = ops.gC - hyOpEx;
    const paybackYears = (deltaCapEx / deltaOpEx).toFixed(1);
    gb.className = 'conclusion__block conclusion__block--blue';
    gasText = `<span class="c-accent">${t.gasVs}</span> `
      + t.gasHybroCheaper_opex(fmtAMD(deltaCapEx), paybackYears);

  } else if (cH < cG && hyOpEx > ops.gC) {
    // HYBRO cheaper upfront but more expensive to run (Solar OFF, cheap gas)
    const deltaCapEx  = cG - cH;
    const deltaOpEx   = hyOpEx - ops.gC;
    const paybackYears = (deltaCapEx / deltaOpEx).toFixed(1);
    gb.className = 'conclusion__block conclusion__block--amber';
    gasText = `<span class="c-accent">${t.gasVs}</span> `
      + t.gasHybroCheaper_capex(fmtAMD(deltaCapEx), paybackYears);

  } else {
    // Gas cheaper on both → honest + CTA
    gb.className = 'conclusion__block conclusion__block--amber';
    gasText = `<span class="c-accent">${t.gasVs}</span> ${t.gasBothLose}`;
  }

  document.getElementById('concl-gas').innerHTML = gasText;
  buildChart(tco);
}
